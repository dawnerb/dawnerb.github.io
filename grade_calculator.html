<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
/* =====================================================================
   GRADE SCALE CONFIGURATION — EDIT THIS SECTION EACH SEMESTER
   =====================================================================
   Row 0: maximum possible points for each category (no letter grade).
   Rows 1–11: minimum points required for each letter grade.
   The calculator normalizes all values against row 0.

   Column keys:
     a = Activities
     r = Reflections
     p = Project
     t = Learning Targets
   ===================================================================== */
const GRADE_SCALE = [
  { grade: null,  a: 22, r: 22, p: 3, t: 25 },  // row 0: max possible
  { grade: 'A',   a: 19, r: 19, p: 3, t: 22 },
  { grade: 'A-',  a: 18, r: 18, p: 3, t: 21 },
  { grade: 'B+',  a: 17, r: 17, p: 3, t: 20 },
  { grade: 'B',   a: 16, r: 16, p: 2, t: 19 },
  { grade: 'B-',  a: 15, r: 15, p: 2, t: 18 },
  { grade: 'C+',  a: 14, r: 14, p: 2, t: 17 },
  { grade: 'C',   a: 13, r: 13, p: 2, t: 16 },
  { grade: 'C-',  a: 12, r: 12, p: 2, t: 15 },
  { grade: 'D+',  a: 11, r: 11, p: 1, t: 14 },
  { grade: 'D',   a: 11, r: 11, p: 1, t: 13 },
  { grade: 'D-',  a: 11, r: 11, p: 1, t: 12 },  // row 11: minimum to pass
];
/* ===================================================================== */
</script>

<style>
  :root {
    --bg: #0d1520;
    --surface: #162033;
    --border: #2e4166;
    --accent: #5b9cf6;
    --accent2: #b39dfa;
    --text: #f0f4ff;
    --muted: #b0bdd4;
    --label: #c8d4e8;
    --focus-ring: #5b9cf6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 1rem;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
  }

  .container {
    width: 100%;
    max-width: 580px;
    padding: 1.25rem 0 2rem;
  }

  /* Header */
  header { margin-bottom: 1.5rem; }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #000;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .subtitle {
    color: #222;
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-heading {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  /* Sections */
  .section { margin-bottom: 1.25rem; }
  .section:last-of-type { margin-bottom: 0; }

  .section-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label::before {
    content: '';
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .section-label.r::before { background: var(--accent2); }
  .section-label.p::before { background: #f9c74f; }
  .section-label.t::before { background: #4dd9ac; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    align-items: start;
  }

  /* Labels & Inputs */
  .field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--label);
  }

  input[type="number"] {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 500;
    padding: 0.55rem 0.75rem;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    outline: 3px solid var(--focus-ring);
    outline-offset: 1px;
    border-color: var(--focus-ring);
  }

  .progress-wrap {
    height: 4px;
    background: var(--bg);
    border-radius: 4px;
    margin-top: 0.4rem;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    width: 0%;
    transition: width 0.35s ease;
  }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(248,81,73,0.12);
    border: 1px solid rgba(248,81,73,0.5);
    border-radius: 8px;
    color: #ffaaaa;
    font-size: 0.85rem;
    padding: 0.65rem 0.9rem;
    margin-top: 1rem;
  }

  /* Button */
  .btn {
    display: block;
    width: 100%;
    padding: 0.85rem 1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.12s;
    margin-bottom: 1rem;
  }

  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:focus {
    outline: 3px solid var(--focus-ring);
    outline-offset: 2px;
  }

  /* Result card */
  #result { display: none; text-align: center; }

  .grade-display {
    font-size: 4.5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .grade-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  .breakdown {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.6rem;
    margin-top: 1.25rem;
    text-align: left;
  }

  .breakdown-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.75rem;
  }

  .breakdown-name {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .breakdown-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-top: 0.15rem;
  }

  .breakdown-pct {
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Grade Calculator</h1>
    <p class="subtitle">Enter your scores below to estimate your current grade.</p>
  </header>

  <div class="card">
    <p class="card-heading">Enter your scores</p>

    <!-- Activities -->
    <div class="section">
      <div class="section-label a">Activities</div>
      <div class="field-row">
        <div class="field">
          <label for="a_completed">Completed</label>
          <input type="number" id="a_completed" min="0" placeholder="e.g. 7"
                 aria-label="Activities completed" oninput="updateBar('a')">
          <div class="progress-wrap"><div class="progress-bar" id="bar_a"></div></div>
        </div>
        <div class="field">
          <label for="a_possible">Possible so far</label>
          <input type="number" id="a_possible" min="1" placeholder="e.g. 8"
                 aria-label="Activities possible so far" oninput="updateBar('a')">
          <div style="height:4px;margin-top:0.4rem"></div>
        </div>
      </div>
    </div>

    <!-- Reflections -->
    <div class="section">
      <div class="section-label r">Reflections</div>
      <div class="field-row">
        <div class="field">
          <label for="r_completed">Completed</label>
          <input type="number" id="r_completed" min="0" placeholder="e.g. 4"
                 aria-label="Reflections completed" oninput="updateBar('r')">
          <div class="progress-wrap"><div class="progress-bar" id="bar_r"></div></div>
        </div>
        <div class="field">
          <label for="r_possible">Possible so far</label>
          <input type="number" id="r_possible" min="1" placeholder="e.g. 4"
                 aria-label="Reflections possible so far" oninput="updateBar('r')">
          <div style="height:4px;margin-top:0.4rem"></div>
        </div>
      </div>
    </div>

    <!-- Project -->
    <div class="section">
      <div class="section-label p">Project</div>
      <div class="field-row">
        <div class="field">
          <label for="p_completed">Completed</label>
          <input type="number" id="p_completed" min="0" placeholder="e.g. 1"
                 aria-label="Project completed" oninput="updateBar('p')">
          <div class="progress-wrap"><div class="progress-bar" id="bar_p"></div></div>
        </div>
        <div class="field">
          <label for="p_possible">Possible so far</label>
          <input type="number" id="p_possible" min="1" placeholder="e.g. 1"
                 aria-label="Project possible so far" oninput="updateBar('p')">
          <div style="height:4px;margin-top:0.4rem"></div>
        </div>
      </div>
    </div>

    <!-- Learning Targets -->
    <div class="section">
      <div class="section-label t">Learning Targets</div>
      <div class="field-row">
        <div class="field">
          <label for="t_completed">Completed</label>
          <input type="number" id="t_completed" min="0" placeholder="e.g. 12"
                 aria-label="Learning targets completed" oninput="updateBar('t')">
          <div class="progress-wrap"><div class="progress-bar" id="bar_t"></div></div>
        </div>
        <div class="field">
          <label for="t_possible">Possible so far</label>
          <input type="number" id="t_possible" min="1" placeholder="e.g. 25"
                 aria-label="Learning targets possible so far" oninput="updateBar('t')">
          <div style="height:4px;margin-top:0.4rem"></div>
        </div>
      </div>
    </div>

    <div class="error-msg" id="error" role="alert" aria-live="polite"></div>
  </div>

  <button class="btn" onclick="calculate()" aria-label="Estimate my current grade">
    Estimate My Current Grade
  </button>

  <div class="card" id="result" aria-live="polite" aria-label="Grade result">
    <p class="card-heading">Estimated current grade</p>
    <div class="grade-display" id="grade-out" aria-label="Grade"></div>
    <p class="grade-label">Current Standing</p>
    <div class="breakdown" id="breakdown"></div>
  </div>

</div>

<script>
  // Normalize grade scale against row 0 (max possible)
  const maxA = GRADE_SCALE[0].a, maxR = GRADE_SCALE[0].r,
        maxP = GRADE_SCALE[0].p, maxT = GRADE_SCALE[0].t;

  const normalized = GRADE_SCALE.map(row => ({
    grade: row.grade,
    a: row.a / maxA,
    r: row.r / maxR,
    p: row.p / maxP,
    t: row.t / maxT,
  }));

  function updateBar(key) {
    const c = parseFloat(document.getElementById(key + '_completed').value) || 0;
    const p = parseFloat(document.getElementById(key + '_possible').value)  || 1;
    const pct = Math.min(100, Math.max(0, (c / p) * 100));
    document.getElementById('bar_' + key).style.width = pct + '%';
  }

  function getVal(id) { return parseFloat(document.getElementById(id).value); }

  function calculate() {
    const err = document.getElementById('error');
    err.style.display = 'none';

    const ac = getVal('a_completed'), ap = getVal('a_possible');
    const rc = getVal('r_completed'), rp = getVal('r_possible');
    const pc = getVal('p_completed'), pp = getVal('p_possible');
    const tc = getVal('t_completed'), tp = getVal('t_possible');

    if ([ac, ap, rc, rp, pc, pp, tc, tp].some(v => isNaN(v) || v < 0)) {
      err.textContent = '⚠ Please fill in all fields with non-negative numbers.';
      err.style.display = 'block';
      return;
    }
    if ([ap, rp, pp, tp].some(v => v <= 0)) {
      err.textContent = '⚠ "Possible so far" values must be greater than zero.';
      err.style.display = 'block';
      return;
    }

    const aFrac = ac / ap, rFrac = rc / rp,
          pFrac = pc / pp, tFrac = tc / tp;

    const lastRow = normalized[normalized.length - 1]; // D- boundary
    let grade;

    if (aFrac < lastRow.a || rFrac < lastRow.r || pFrac < lastRow.p || tFrac < lastRow.t) {
      grade = 'F';
    } else {
      const rows = normalized.slice(1);
      const aIdx = rows.findIndex(r => aFrac >= r.a);
      const rIdx = rows.findIndex(r => rFrac >= r.r);
      const pIdx = rows.findIndex(r => pFrac >= r.p);
      const tIdx = rows.findIndex(r => tFrac >= r.t);
      const worstIdx = Math.max(aIdx, rIdx, pIdx, tIdx);
      grade = rows[worstIdx].grade;
    }

    // Show result
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    const gradeOut = document.getElementById('grade-out');
    gradeOut.textContent = grade;
    gradeOut.style.animation = 'none';
    void gradeOut.offsetHeight;
    gradeOut.style.animation = '';

    // High-contrast grade colors (WCAG AA on dark bg)
    const gradeColors = {
      'A': '#4ade80', 'A-': '#4ade80',
      'B+': '#60a5fa', 'B': '#60a5fa', 'B-': '#60a5fa',
      'C+': '#c084fc', 'C': '#c084fc', 'C-': '#c084fc',
      'D+': '#fb923c', 'D': '#fb923c', 'D-': '#fb923c',
      'F':  '#f87171'
    };
    gradeOut.style.background = 'none';
    gradeOut.style.webkitTextFillColor = gradeColors[grade] || '#f0f4ff';
    gradeOut.style.color = gradeColors[grade] || '#f0f4ff';

    document.getElementById('breakdown').innerHTML = `
      <div class="breakdown-item">
        <div class="breakdown-name">Activities</div>
        <div class="breakdown-value">${ac} / ${ap}</div>
        <div class="breakdown-pct">${(aFrac * 100).toFixed(1)}%</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-name">Reflections</div>
        <div class="breakdown-value">${rc} / ${rp}</div>
        <div class="breakdown-pct">${(rFrac * 100).toFixed(1)}%</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-name">Project</div>
        <div class="breakdown-value">${pc} / ${pp}</div>
        <div class="breakdown-pct">${(pFrac * 100).toFixed(1)}%</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-name">Learning Targets</div>
        <div class="breakdown-value">${tc} / ${tp}</div>
        <div class="breakdown-pct">${(tFrac * 100).toFixed(1)}%</div>
      </div>
    `;
  }
</script>
</body>
</html>
